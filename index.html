<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rick and Morty: Parasite Protocol</title>
    <link href="https://fonts.googleapis.com/css?family=VT323" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/images/mortyIcon.png" />
    <script type="module" crossorigin src="/assets/index-BafweFSW.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-loO-Tsc4.css">
  </head>
  <body>
    <!-- Main Game Container -->
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      
      <!-- UI Layer Overlay -->
      <div id="ui-layer">
        
        <!-- Loading Screen -->
        <div id="loading-screen" class="screen">
          <h1 class="title">Carregando...</h1>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen hidden">
          <h1 class="title">Rick and Morty</h1>
          <h2 class="subtitle">Parasite Protocol</h2>
          <div class="menu-buttons">
            <button id="btn-start" class="btn">Jogar</button>
          </div>
          <div class="instructions">
            <p>Use as Setas Cima/Baixo para mover.</p>
            <p>Use Espaço para atirar nos parasitas!</p>
          </div>
        </div>

        <!-- Story Intro Screen -->
        <div id="story-screen" class="screen hidden" style="background-color: black;">
          <div id="story-image" style="width: 75vw; height: 40vw; background-size: cover; background-position: center; border: 4px solid var(--neon-green); border-radius: 8px;"></div>
          <div class="menu-buttons" style="margin-top: 2rem;">
            <button id="btn-story-next" class="btn">...</button>
            <button id="btn-story-start" class="btn hidden">Iniciar Jogo</button>
          </div>
        </div>

        <!-- Gameplay HUD -->
        <div id="hud" class="screen hidden">
          <div class="hud-top">
            <div class="stats">
              <span id="stat-kills">Kills: 0</span>
              <span id="stat-time">Tempo: 00:00</span>
            </div>
            <div id="character-unlocks">
              <div id="char-Summer" class="char-portrait locked" data-char="Summer" title="10 Kills" style="background-image: url('/images/SummerJogavel.png')"></div>
              <div id="char-Jaguar" class="char-portrait locked" data-char="Jaguar" title="30 Kills" style="background-image: url('/images/JaguarJogavel.png')"></div>
              <div id="char-Wizard" class="char-portrait locked" data-char="Wizard" title="50 Kills" style="background-image: url('/images/WizardJogavel.png')"></div>
              <div id="char-Pickle" class="char-portrait locked" data-char="Pickle" title="100 Kills" style="background-image: url('/images/PickleJogavel.png')"></div>
            </div>
            <div class="lives" id="lives-container">
              <!-- Lives images will go here -->
            </div>
          </div>
          
          <!-- Virtual Mobile Controls (Visible only on touch/mobile) -->
          <div id="mobile-controls">
            <div class="dpad">
              <button id="btn-up" class="touch-btn">▲</button>
              <button id="btn-down" class="touch-btn">▼</button>
            </div>
            <div class="action-buttons">
              <button id="btn-shoot" class="touch-btn">FIRE</button>
            </div>
          </div>
          
          <!-- Global Mute Button -->
          <button id="btn-mute" class="mute-btn" title="Ligar/Desligar Som">
            <svg id="icon-sound-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <svg id="icon-sound-off" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" class="screen hidden">
          <h1 class="title">Game Over</h1>
          <h2 class="subtitle">Os parasitas tomaram conta!</h2>
          <p class="final-score">Kills: <span id="final-kills">0</span> | Sobrevivência: <span id="final-time">00:00</span></p>
          <div class="menu-buttons">
            <button id="btn-restart" class="btn">Tentar Novamente</button>
          </div>
        </div>

      </div>
    </div>
  </body>
</html>
